<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ QuickPlay!</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --void:#040508;--deep:#07090f;--surface:#0c0f1a;--surface2:#111522;--surface3:#161c2e;
  --panel:#0e1220;--border:#1a2240;--border2:#243060;
  --cyan:#00e5ff;--cyan2:#00b8d4;--cyan-dim:rgba(0,229,255,0.08);--cyan-glow:rgba(0,229,255,0.25);
  --magenta:#ff007a;--mag-dim:rgba(255,0,122,0.08);--mag-glow:rgba(255,0,122,0.3);
  --green:#00ff88;--grn-dim:rgba(0,255,136,0.08);
  --amber:#ffaa00;--amb-dim:rgba(255,170,0,0.08);
  --violet:#9b5cf6;--vio-dim:rgba(155,92,246,0.12);
  --red:#ff4040;--red-dim:rgba(255,64,64,0.1);
  --text:#c8d8f0;--text2:#6b80a8;--text3:#344060;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:var(--void);color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:14px;
  display:flex;flex-direction:column;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%,rgba(0,229,255,0.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 60% at 80% 70%,rgba(155,92,246,0.06) 0%,transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(255,0,122,0.03) 0%,transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
}
.scan-line{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.12),transparent);animation:scanline 10s linear infinite;pointer-events:none;z-index:3;}
@keyframes scanline{from{transform:translateY(-2px)}to{transform:translateY(100vh)}}

/* ── TOPBAR ── */
#topbar{
  position:relative;z-index:100;
  height:48px;background:var(--surface);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;
  padding:0 18px;gap:10px;flex-shrink:0;
  box-shadow:0 2px 20px rgba(0,0,0,0.5);
}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;}

.tb-brand{
  font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;
  color:var(--amber);text-shadow:0 0 20px rgba(255,170,0,0.5);
  letter-spacing:0.05em;flex-shrink:0;white-space:nowrap;
}
.tb-brand span{color:var(--magenta);}

.tb-sep{width:1px;height:22px;background:var(--border2);flex-shrink:0;}

.tb-back{
  display:flex;align-items:center;gap:6px;
  padding:0 14px;height:30px;border-radius:6px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-family:'Orbitron',monospace;
  font-size:0.55rem;font-weight:700;letter-spacing:0.1em;
  cursor:pointer;transition:all 0.15s;text-decoration:none;
  flex-shrink:0;
}
.tb-back:hover{border-color:rgba(0,229,255,0.4);color:var(--cyan);background:var(--cyan-dim);}

/* search bar */
#search-wrap{
  flex:1;max-width:460px;height:32px;
  background:var(--deep);border:1px solid var(--border2);
  border-radius:6px;display:flex;align-items:center;
  padding:0 10px;gap:7px;transition:border-color 0.2s;
}
#search-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,0.1);}
#search-inp{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:var(--text);caret-color:var(--cyan);
}
#search-inp::placeholder{color:var(--text3);}

.tb-count{
  font-family:'Share Tech Mono',monospace;font-size:0.65rem;
  color:var(--text3);margin-left:auto;flex-shrink:0;
}
#tb-clock{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text3);flex-shrink:0;}

/* ── CAT FILTER BAR ── */
#catbar{
  position:relative;z-index:99;
  height:38px;background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
#catbar::-webkit-scrollbar{display:none;}
.cat-btn{
  flex-shrink:0;height:24px;padding:0 12px;border-radius:5px;
  border:1px solid var(--border);background:transparent;
  color:var(--text3);font-family:'Orbitron',monospace;
  font-size:0.52rem;font-weight:700;letter-spacing:0.1em;
  cursor:pointer;transition:all 0.14s;white-space:nowrap;
}
.cat-btn:hover{border-color:var(--border2);color:var(--text2);}
.cat-btn.active{border-color:var(--cat-color,var(--cyan));color:var(--cat-color,var(--cyan));background:rgba(0,229,255,0.06);}

/* ── MAIN AREA ── */
#main{position:relative;z-index:2;flex:1;display:flex;overflow:hidden;}

/* ── GAME LAUNCHER (iframe overlay) ── */
#launcher{
  display:none;position:absolute;inset:0;z-index:50;
  background:var(--void);flex-direction:column;
}
#launcher.active{display:flex;}
#launcher-bar{
  height:36px;background:var(--surface);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;
}
#launcher-title{
  font-family:'Orbitron',monospace;font-size:0.7rem;
  color:var(--amber);font-weight:700;letter-spacing:0.08em;flex:1;
}
#launcher-fullscreen{
  padding:0 12px;height:26px;border-radius:4px;
  border:1px solid rgba(0,229,255,0.3);background:var(--cyan-dim);
  color:var(--cyan);font-family:'Orbitron',monospace;
  font-size:0.5rem;font-weight:700;letter-spacing:0.1em;cursor:pointer;
}
#launcher-fullscreen:hover{background:rgba(0,229,255,0.15);}
#launcher-close{
  padding:0 12px;height:26px;border-radius:4px;
  border:1px solid rgba(255,0,122,0.3);background:var(--mag-dim);
  color:var(--magenta);font-family:'Orbitron',monospace;
  font-size:0.5rem;font-weight:700;letter-spacing:0.1em;cursor:pointer;
}
#launcher-close:hover{background:rgba(255,0,122,0.2);}
#game-iframe{flex:1;border:none;background:#000;}

/* ── GAME GRID ── */
#grid-area{
  flex:1;overflow-y:auto;padding:20px 22px 40px;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
#grid-area::-webkit-scrollbar{width:5px;}
#grid-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.cat-section{margin-bottom:28px;}
.cat-heading{
  display:flex;align-items:center;gap:12px;margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.cat-heading-icon{font-size:1.1rem;}
.cat-heading-name{
  font-family:'Orbitron',monospace;font-size:0.7rem;
  font-weight:700;letter-spacing:0.12em;
}
.cat-heading-count{
  font-family:'Share Tech Mono',monospace;font-size:0.62rem;
  color:var(--text3);background:var(--surface2);
  padding:2px 8px;border-radius:10px;border:1px solid var(--border);
}

.game-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

.game-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;cursor:pointer;
  transition:all 0.18s;position:relative;
  display:flex;flex-direction:column;
}
.game-card:hover{
  border-color:var(--card-color,var(--cyan));
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 8px 30px rgba(0,0,0,0.5),0 0 20px var(--card-glow,rgba(0,229,255,0.15));
}
.game-card:hover .game-play-overlay{opacity:1;}
.game-card:hover .game-art{filter:brightness(0.65);}

.game-art{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;transition:filter 0.2s;
  background:var(--surface2);border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
/* Subtle gradient shimmer on art */
.game-art::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 50%,rgba(0,0,0,0.2) 100%);
}

.game-play-overlay{
  position:absolute;top:0;left:0;right:0;
  aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.4);opacity:0;transition:opacity 0.15s;
}
.play-btn-icon{
  width:44px;height:44px;border-radius:50%;
  background:rgba(0,229,255,0.9);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--void);
  box-shadow:0 0 20px rgba(0,229,255,0.6);
}

.game-info{padding:9px 10px 10px;}
.game-name{
  font-size:0.8rem;font-weight:600;color:var(--text);
  line-height:1.3;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.game-cat-pill{
  display:inline-block;
  font-family:'Share Tech Mono',monospace;font-size:0.55rem;
  padding:1px 7px;border-radius:3px;letter-spacing:0.06em;
}

/* No results */
.no-results{
  text-align:center;padding:60px 20px;
  font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--text3);
}

/* Loading bar */
#load-bar{
  position:fixed;top:48px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--amber),var(--magenta));
  width:0%;opacity:0;z-index:200;transition:width 0.2s,opacity 0.3s;
  box-shadow:0 0 8px var(--amber);
}

/* Toast */
#toast{
  position:fixed;bottom:18px;right:18px;z-index:400;
  background:var(--surface2);border:1px solid var(--border2);
  border-left:3px solid var(--amber);border-radius:8px;
  padding:10px 16px;font-family:'Share Tech Mono',monospace;
  font-size:0.72rem;color:var(--text2);
  transform:translateY(60px);opacity:0;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}
#toast.show{transform:translateY(0);opacity:1;}
</style>
</head>

  <span class="tb-count" id="count-label">66 games</span>
  <div class="tb-sep"></div>
  <div id="tb-clock"></div>
</div>

<!-- CATEGORY FILTER BAR -->
<div id="catbar">
  <button class="cat-btn active" data-cat="ALL" style="--cat-color:var(--cyan)" onclick="setCat('ALL',this)">ALL</button>

  <button class="cat-btn" data-cat="Sports" style="--cat-color:var(--green)" onclick="setCat('Sports',this)">🏆 SPORTS</button>
  <button class="cat-btn" data-cat="Platform / Runner" style="--cat-color:var(--violet)" onclick="setCat('Platform / Runner',this)">🏃 PLATFORM</button>

  <button class="cat-btn" data-cat="Other" style="--cat-color:var(--text2)" onclick="setCat('Other',this)">🎮 OTHER</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- Game launcher iframe overlay -->
  <div id="launcher">
    <div id="launcher-bar">
      <span id="launcher-title">LOADING…</span>
      <button id="launcher-fullscreen" onclick="goFullscreen()">⛶ FULLSCREEN</button>
      <button id="launcher-close" onclick="closeLauncher()">✕ EXIT GAME</button>
    </div>
    <iframe id="game-iframe" allowfullscreen></iframe>
  </div>

  <!-- Game grid -->
  <div id="grid-area">
    <!-- injected by JS -->
  </div>
</div>

<script>
/* ── CLOCK ── */
function tick(){const n=new Date();document.getElementById('tb-clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
setInterval(tick,1000);tick();

/* ── TOAST ── */
let toastT;
function toast(msg,color='var(--amber)'){
  const t=document.getElementById('toast');
  t.style.borderLeftColor=color;t.textContent=msg;
  t.classList.add('show');clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2600);
}

function startLoad(){const b=document.getElementById('load-bar');b.style.opacity='1';lw=0;const s=()=>{lw=Math.min(lw+Math.random()*12,85);b.style.width=lw+'%';if(lw<85)lt=setTimeout(s,180);};s();}
function stopLoad(){clearTimeout(lt);const b=document.getElementById('load-bar');b.style.width='100%';setTimeout(()=>{b.style.opacity='0';b.style.width='0%';},500);}

  {file:"TempleRun2.html",         name:"Temple Run 2",                cat:"Platform / Runner"},
  {file:"TinyFishing.html",        name:"Tiny Fishing",                cat:"Other"},
  {file:"WorldBox.html",           name:"World Box",                   cat:"Sandbox"},
];

let activeCat = 'ALL';
let searchQ = '';

function setCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filterGames() {
  searchQ = document.getElementById('search-inp').value.toLowerCase().trim();
  renderGrid();
}

function getFiltered() {
  return GAMES.filter(g => {
    const catOk = activeCat === 'ALL' || g.cat === activeCat;
    const qOk   = !searchQ || g.name.toLowerCase().includes(searchQ) || g.cat.toLowerCase().includes(searchQ);
    return catOk && qOk;
  });
}

function renderGrid() {
  const filtered = getFiltered();
  const area = document.getElementById('grid-area');
  document.getElementById('count-label').textContent = filtered.length + ' game' + (filtered.length !== 1 ? 's' : '');

  if (!filtered.length) {
    area.innerHTML = '<div class="no-results">// NO MATCHES FOUND //<br><br>Try a different search or category.</div>';
    return;
  }

  // Group by category if showing ALL
  if (activeCat === 'ALL' && !searchQ) {
    const catOrder = ['Action / Fighting','FNAF',"Papa's",'Sports','Platform / Runner','Ragdoll / Physics','Sandbox','Other'];
    let html = '';
    catOrder.forEach(cat => {
      const games = GAMES.filter(g => g.cat === cat);
      if (!games.length) return;
      const cfg = CAT_CONFIG[cat];
      html += `<div class="cat-section">
        <div class="cat-heading">
          <span class="cat-heading-icon">${cfg.icon}</span>
          <span class="cat-heading-name" style="color:${cfg.color}">${cat.toUpperCase()}</span>
          <span class="cat-heading-count">${games.length}</span>
        </div>
        <div class="game-grid">${games.map(g => gameCardHTML(g)).join('')}</div>
      </div>`;
    });
    area.innerHTML = html;
  } else {
    area.innerHTML = `<div class="game-grid">${filtered.map(g => gameCardHTML(g)).join('')}</div>`;
  }
}

function gameCardHTML(g) {
  const cfg = CAT_CONFIG[g.cat];
  const emoji = GAME_EMOJI[g.cat] || '🎮';
  return `<div class="game-card" style="--card-color:${cfg.color};--card-glow:${cfg.glow}" onclick="launchGame('${g.file.replace(/'/g,"\\'")}','${g.name.replace(/'/g,"\\'")}')">
    <div class="game-art">${emoji}
      <div class="game-play-overlay"><div class="play-btn-icon">▶</div></div>
    </div>
    <div class="game-info">
      <div class="game-name" title="${g.name}">${g.name}</div>
      <span class="game-cat-pill" style="background:${cfg.pill};color:${cfg.pillText}">${g.cat}</span>
    </div>
  </div>`;
}

/* ── LAUNCHER ── */
const launcher = document.getElementById('launcher');
const gameIframe = document.getElementById('game-iframe');
const launcherTitle = document.getElementById('launcher-title');

function launchGame(file, name) {
  launcherTitle.textContent = '⚡ ' + name;
  gameIframe.src = 'QuickPlay!/' + file;
  launcher.classList.add('active');
  startLoad();
  gameIframe.onload = stopLoad;
  toast('▶ Loading ' + name + '…', 'var(--amber)');
}

function closeLauncher() {
  launcher.classList.remove('active');
  gameIframe.src = '';
  stopLoad();
}

function goFullscreen() {
  if (gameIframe.requestFullscreen) gameIframe.requestFullscreen();
  else if (gameIframe.webkitRequestFullscreen) gameIframe.webkitRequestFullscreen();
}

// ESC closes launcher
document.addEventListener('keydown', e => { if (e.key === 'Escape' && launcher.classList.contains('active')) closeLauncher(); });

// Initial render
renderGrid();
</script>
</body>
</html>
